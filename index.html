<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Discord — Servidor amigos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-tertiary:   #1e2124;
      --bg-secondary:  #2f3136;
      --bg-primary:    #36393f;
      --bg-floating:   #18191c;
      --channelbg-hover: #34373c;
      --channelbg-active: #3a3c42;
      --text-normal:   #dcddde;
      --text-muted:    #72767d;
      --header-primary: #ffffff;
      --header-secondary: #b9bbbe;
      --interactive-normal: #b9bbbe;
      --interactive-hover: #dcddde;
      --interactive-active: #ffffff;
      --brand:         #5865f2;
      --brand-hover:   #4752c4;
      --green:         #3ba55c;
      --red:           #ed4245;
      --border:        #202225;
      --scrollbar:     #202225;
      --input-bg:      #40444b;
      --msg-hover:     rgba(4,4,5,0.07);
      --radius:        4px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-normal);
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* ── Server rail ── */
    .server-rail {
      width: 72px; min-width: 72px;
      background: var(--bg-tertiary);
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0; gap: 8px; overflow-y: auto;
    }
    .server-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: white; cursor: pointer;
      transition: border-radius .15s, background .15s; position: relative; flex-shrink: 0;
    }
    .server-icon:hover { border-radius: 16px; background: var(--brand-hover); }
    .server-icon.active { border-radius: 16px; }
    .server-icon.active::before {
      content: ''; position: absolute; left: -16px;
      width: 4px; height: 40px; background: white; border-radius: 0 4px 4px 0;
    }
    .server-separator { width: 32px; height: 2px; background: var(--bg-secondary); border-radius: 1px; }

    /* ── Channels sidebar ── */
    .channels-sidebar {
      width: 240px; min-width: 240px;
      background: var(--bg-secondary);
      display: flex; flex-direction: column;
    }
    .server-header {
      height: 48px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); cursor: pointer;
      font-weight: 600; font-size: 15px; color: var(--header-primary);
      flex-shrink: 0; box-shadow: 0 1px 0 rgba(0,0,0,.2);
    }
    .server-header:hover { background: var(--channelbg-hover); }
    .server-header-arrow { color: var(--interactive-normal); font-size: 11px; }
    .channels-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .channel-category {
      padding: 16px 8px 4px 8px;
      display: flex; align-items: center; gap: 4px; cursor: pointer;
    }
    .channel-category-name {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .02em; color: var(--text-muted);
    }
    .channel-item {
      display: flex; align-items: center; gap: 6px;
      padding: 1px 8px; margin: 0 8px; border-radius: var(--radius);
      cursor: pointer; color: var(--text-muted);
      font-size: 15px; font-weight: 500; height: 34px;
      transition: background .05s, color .05s;
    }
    .channel-item:hover { background: var(--channelbg-hover); color: var(--interactive-hover); }
    .channel-item.active { background: var(--channelbg-active); color: var(--interactive-active); }
    .channel-item-icon { font-size: 18px; width: 20px; text-align: center; flex-shrink: 0; }

    /* voice members */
    .voice-members-section { padding: 4px 0 8px; }
    .voice-user {
      display: flex; align-items: center; gap: 8px;
      padding: 1px 8px 1px 28px; margin: 0 8px;
      border-radius: var(--radius); height: 32px;
    }
    .voice-user:hover { background: var(--channelbg-hover); }
    .voice-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      flex-shrink: 0; position: relative;
    }
    .voice-avatar.speaking::after {
      content: ''; position: absolute; inset: -2px;
      border-radius: 50%; border: 2px solid var(--green);
      animation: speakPulse .8s ease infinite;
    }
    @keyframes speakPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .voice-user-name { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .voice-user-name.speaking { color: var(--green); }
    .voice-mic-icon { margin-left: auto; font-size: 12px; color: var(--text-muted); }

    /* user panel */
    .user-panel {
      height: 52px; background: var(--bg-floating);
      display: flex; align-items: center; padding: 0 8px; gap: 8px; flex-shrink: 0;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 13px; font-weight: 600; color: var(--header-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-tag { font-size: 11px; color: var(--text-muted); }
    .user-actions { display: flex; gap: 2px; }
    .user-action-btn {
      width: 32px; height: 32px; border-radius: var(--radius);
      border: none; background: transparent; color: var(--interactive-normal);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; padding: 0; transition: background .1s, color .1s;
    }
    .user-action-btn:hover { background: var(--channelbg-hover); color: var(--interactive-hover); }

    /* voice status bar */
    .voice-status-bar {
      background: #36393f; border-top: 1px solid var(--border);
      padding: 8px 12px; flex-shrink: 0;
    }
    .voice-connected-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .voice-connected-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
    .voice-connected-dot.disconnected { background: var(--text-muted); }
    .voice-connected-label { font-size: 12px; font-weight: 600; color: var(--green); flex: 1; }
    .voice-connected-label.disconnected { color: var(--text-muted); }
    .action-btn-row { display: flex; gap: 6px; }
    .action-btn-row .action-btn { flex: 1; }
    .action-btn {
      width: 100%; padding: 8px 0; border-radius: var(--radius); border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .1s, filter .1s; font-family: inherit;
    }
    .action-btn.primary { background: var(--brand); color: white; }
    .action-btn.primary:hover { background: var(--brand-hover); }
    .action-btn.danger { background: var(--red); color: white; }
    .action-btn.danger:hover { filter: brightness(1.1); }
    .action-btn.secondary { background: var(--bg-floating); color: var(--text-normal); border: 1px solid var(--border); }
    .action-btn.secondary:hover { background: var(--channelbg-hover); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-primary); }
    .topbar {
      height: 48px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
      flex-shrink: 0; box-shadow: 0 1px 0 rgba(0,0,0,.2);
    }
    .topbar-icon { font-size: 20px; color: var(--text-muted); }
    .topbar-channel-name { font-size: 15px; font-weight: 600; color: var(--header-primary); }
    .topbar-separator { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
    .topbar-topic { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* streams grid */
    #streams-container {
      display: flex; flex-direction: column; gap: 0;
      max-height: 45vh; overflow-y: auto;
    }
    #streams-container:empty { display: none; }

    .stream-card {
      position: relative; background: #000;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stream-card-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 6px 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,.75), transparent);
      display: flex; align-items: center; gap: 6px;
      z-index: 2; opacity: 0; transition: opacity .2s;
    }
    .stream-card:hover .stream-card-header { opacity: 1; }
    .stream-card-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 10px;
      background: linear-gradient(to top, rgba(0,0,0,.75), transparent);
      display: flex; align-items: center; gap: 6px;
      z-index: 2; opacity: 0; transition: opacity .2s;
    }
    .stream-card:hover .stream-card-footer { opacity: 1; }

    .screen-live-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--red); color: white;
      font-size: 10px; font-weight: 700; letter-spacing: .05em;
      padding: 2px 6px; border-radius: 3px;
    }
    .screen-live-dot {
      width: 5px; height: 5px; border-radius: 50%; background: white;
      animation: livePulse 1.2s ease infinite;
    }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    .stream-author {
      font-size: 12px; font-weight: 600; color: white;
    }
    .stream-stats {
      font-size: 10px; color: rgba(255,255,255,.6); font-family: monospace; margin-left: auto;
    }
    .stream-ctrl-btn {
      height: 26px; padding: 0 8px; border-radius: var(--radius); border: none;
      background: rgba(255,255,255,.15); color: white;
      font-size: 11px; font-weight: 500; cursor: pointer; transition: background .1s;
      font-family: inherit;
    }
    .stream-ctrl-btn:hover { background: rgba(255,255,255,.3); }
    .stream-ctrl-btn.danger { background: rgba(237,66,69,.5); }
    .stream-ctrl-btn.danger:hover { background: rgba(237,66,69,.8); }
    .stream-ctrl-btn.muted { background: rgba(255,255,255,.08); color: rgba(255,255,255,.45); }

    .stream-video {
      width: 100%; display: block; object-fit: contain;
      background: #000; max-height: 40vh; min-height: 160px;
    }
    .stream-video:fullscreen, .stream-video:-webkit-full-screen {
      width: 100vw !important; height: 100vh !important;
      max-height: none !important; object-fit: fill !important;
    }

    /* messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px 0 8px; display: flex; flex-direction: column; }
    .message { padding: 2px 16px; display: flex; flex-direction: column; transition: background .05s; }
    .message:hover { background: var(--msg-hover); }
    .message-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .message-author { font-size: 15px; font-weight: 500; color: var(--header-primary); cursor: pointer; }
    .message-author:hover { text-decoration: underline; }
    .message-timestamp { font-size: 11px; color: var(--text-muted); }
    .message-text { font-size: 15px; line-height: 1.375; color: var(--text-normal); word-wrap: break-word; }
    .message.system .message-text { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 4px 0; }

    /* input */
    .input-area { padding: 0 16px 24px; flex-shrink: 0; }
    .input-box {
      background: var(--input-bg); border-radius: 8px;
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
    }
    .input-box input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text-normal); font-size: 15px; font-family: inherit;
      padding: 11px 0; line-height: 1.375;
    }
    .input-box input::placeholder { color: var(--text-muted); }
    .input-send-btn {
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 20px; padding: 0; line-height: 1; transition: color .1s;
    }
    .input-send-btn:hover { color: var(--interactive-hover); background: transparent; }

    /* ── Right panel ── */
    .right-panel { width: 240px; min-width: 240px; background: var(--bg-secondary); display: flex; flex-direction: column; }
    .right-panel-section { padding: 16px 8px 8px; }
    .right-panel-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .02em; color: var(--text-muted); padding: 0 8px 6px;
    }
    .screen-controls-panel { padding: 8px; display: flex; flex-direction: column; gap: 8px; }
    .ctrl-row { display: flex; align-items: center; gap: 8px; }
    .ctrl-label { font-size: 11px; color: var(--text-muted); min-width: 50px; }
    .ctrl-select {
      flex: 1; background: var(--bg-floating); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-normal);
      padding: 4px 8px; font-size: 12px; outline: none; cursor: pointer;
    }
    .ctrl-select:hover { border-color: var(--brand); }
    .ctrl-input {
      width: 80px; background: var(--bg-floating); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-normal);
      padding: 4px 8px; font-size: 12px; outline: none;
    }
    .ctrl-input:hover, .ctrl-input:focus { border-color: var(--brand); }

    /* ── Username overlay ── */
    .username-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    .username-card {
      background: var(--bg-secondary); border-radius: 8px; padding: 32px;
      width: 100%; max-width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .username-card h2 { font-size: 24px; font-weight: 700; color: var(--header-primary); text-align: center; margin-bottom: 8px; }
    .username-card p { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 24px; }
    .username-card label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .02em; color: var(--header-secondary); margin-bottom: 8px; }
    .username-card input {
      width: 100%; padding: 10px 12px; background: var(--bg-floating);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text-normal); font-size: 16px; font-family: inherit;
      outline: none; margin-bottom: 20px;
    }
    .username-card input:focus { border-color: var(--brand); }
    .username-card input::placeholder { color: var(--text-muted); }
    .username-card button {
      width: 100%; padding: 12px; background: var(--brand); color: white;
      border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .username-card button:hover { background: var(--brand-hover); }

    /* connection status toast */
    #conn-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #18191c; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 20px; font-size: 13px; color: var(--text-muted);
      display: none; z-index: 200; gap: 8px; align-items: center;
      white-space: nowrap; max-width: calc(100vw - 32px);
    }
    #conn-toast.show { display: flex; }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: livePulse 1s infinite; }
    .toast-dot.green { background: var(--green); animation: none; }

    /* ── Botones de menú móvil ── */
    .topbar-menu-btn {
      display: none; background: transparent; border: none;
      color: var(--interactive-normal); font-size: 20px;
      cursor: pointer; padding: 4px; border-radius: var(--radius);
      line-height: 1; flex-shrink: 0;
    }
    .topbar-menu-btn:hover { color: var(--interactive-hover); background: var(--channelbg-hover); }

    /* Overlay oscuro para cerrar sidebar en móvil */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 49;
    }
    #sidebar-overlay.show { display: block; }

    /* ══════════════════════════════════════
       RESPONSIVE — Tablet (< 1100px)
    ══════════════════════════════════════ */
    @media (max-width: 1100px) {
      .right-panel { display: none; }
      /* Panel derecho como drawer desde la derecha */
      .right-panel.open {
        display: flex; position: fixed; right: 0; top: 0; bottom: 0;
        z-index: 50; box-shadow: -4px 0 20px rgba(0,0,0,.5);
      }
      .topbar-menu-btn.settings-btn { display: flex; align-items: center; justify-content: center; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — Móvil (< 720px)
    ══════════════════════════════════════ */
    @media (max-width: 720px) {
      /* Ocultar rail de servidores (poco espacio) */
      .server-rail { display: none; }

      /* Sidebar izquierdo como drawer desde la izquierda */
      .channels-sidebar {
        display: none; position: fixed; left: 0; top: 0; bottom: 0;
        z-index: 50; width: min(280px, 85vw);
        box-shadow: 4px 0 20px rgba(0,0,0,.5);
      }
      .channels-sidebar.open { display: flex; }

      /* Mostrar botón hamburguesa */
      .topbar-menu-btn.sidebar-btn { display: flex; align-items: center; justify-content: center; }

      /* Topbar más compacta */
      .topbar { padding: 0 10px; gap: 8px; }
      .topbar-separator, .topbar-topic { display: none; }

      /* Chat input más cómodo */
      .input-area { padding: 0 8px 16px; }

      /* Mensajes con menos padding lateral */
      .message { padding: 2px 10px; }

      /* Stream video más alto en móvil */
      .stream-video { max-height: 55vw; min-height: 120px; }
      #streams-container { max-height: 60vw; }

      /* Username card */
      .username-card { padding: 24px 16px; margin: 0 12px; }
      .username-card h2 { font-size: 20px; }

      /* Font base más pequeña */
      body { font-size: 13px; }
      .message-author, .message-text { font-size: 14px; }
      .input-box input { font-size: 14px; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — Pantallas muy pequeñas (< 400px)
    ══════════════════════════════════════ */
    @media (max-width: 400px) {
      .channels-sidebar { width: 92vw; }
      .stream-video { max-height: 50vw; }
      .action-btn { font-size: 12px; padding: 6px 0; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — Pantallas grandes (>= 1440px)
    ══════════════════════════════════════ */
    @media (min-width: 1440px) {
      .channels-sidebar { width: 260px; min-width: 260px; }
      .right-panel { width: 260px; min-width: 260px; }
      .stream-video { max-height: 35vh; }
    }
  </style>
</head>
<body>

  <!-- Server rail -->
  <div class="server-rail">
    <div class="server-icon active" title="Servidor amigos">A</div>
    <div class="server-separator"></div>
  </div>

  <!-- Channels sidebar -->
  <div class="channels-sidebar">
    <div class="server-header">
      Servidor amigos <span class="server-header-arrow">▼</span>
    </div>
    <div class="channels-list">
      <div class="channel-category">
        <span class="channel-category-name">Canales de texto</span>
      </div>
      <div class="channel-item active" id="chan-general">
        <span class="channel-item-icon">#</span> general
      </div>
      <div class="channel-category" style="margin-top:8px;">
        <span class="channel-category-name">Canales de voz</span>
      </div>
      <div class="channel-item" id="chan-voice">
        <span class="channel-item-icon">🔊</span> general
      </div>
      <div class="voice-members-section">
        <div id="voice-users-list"></div>
      </div>
    </div>

    <div class="voice-status-bar">
      <div class="voice-connected-header">
        <div class="voice-connected-dot disconnected" id="voice-dot"></div>
        <span class="voice-connected-label disconnected" id="voice-status">Desconectado</span>
      </div>
      <div class="action-btn-row">
        <button class="action-btn primary" id="voice-toggle">Conectar</button>
        <button class="action-btn secondary" id="screen-toggle">🖥 Pantalla</button>
      </div>
    </div>

    <div class="user-panel">
      <div class="user-avatar" id="user-avatar-icon">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name-display">—</div>
        <div class="user-tag">#0001</div>
      </div>
      <div class="user-actions">
        <button class="user-action-btn" title="Cambiar nombre" id="btn-rename">✏️</button>
      </div>
    </div>
  </div>

  <!-- Overlay para cerrar sidebars en móvil -->
  <div id="sidebar-overlay"></div>

  <!-- Main chat area -->
  <div class="main">
    <div class="topbar">
      <button class="topbar-menu-btn sidebar-btn" id="btn-sidebar-toggle" title="Canales">☰</button>
      <span class="topbar-icon">#</span>
      <span class="topbar-channel-name">general</span>
      <div class="topbar-separator"></div>
      <span class="topbar-topic">Chat de texto del servidor</span>
      <button class="topbar-menu-btn settings-btn" id="btn-settings-toggle" title="Ajustes de transmisión" style="margin-left:auto;">⚙</button>
    </div>

    <!-- Streams activos (multi-stream) -->
    <div id="streams-container"></div>

    <div id="messages" class="messages"></div>

    <div class="input-area">
      <form id="form">
        <div class="input-box">
          <input id="input" type="text" autocomplete="off" placeholder="Enviar mensaje a #general" />
          <button type="submit" class="input-send-btn" title="Enviar">➤</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">
    <div class="right-panel-section">
      <div class="right-panel-title">Calidad de transmisión</div>
      <div class="screen-controls-panel">
        <div class="ctrl-row">
          <span class="ctrl-label">Resolución</span>
          <select class="ctrl-select" id="screen-resolution">

  <script>
    // ═══════════════════════════════════════════════════════════════
    // CONFIG SUPABASE
    // ═══════════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://twlqfiatocyeasmnatzj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3bHFmaWF0b2N5ZWFzbW5hdHpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDc5NTEsImV4cCI6MjA4ODYyMzk1MX0.hosd2PCXszVxMeuqfgDb94sTZcF20BYvNptfsVl1qxk';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ═══════════════════════════════════════════════════════════════
    // ESTADO GLOBAL
    // ═══════════════════════════════════════════════════════════════
    let myId       = crypto.randomUUID();  // ID único por sesión
    let username   = localStorage.getItem('username') || '';
    let inVoice    = false;
    let localStream    = null;
    let screenStream   = null;
    let screenBitrateKbps = 20000;
    let audioContext = null, analyser = null, micSource = null;
    let statsInterval = null;
    let realtimeChannel = null;

    const peers = {};
    const pendingCandidates = {};
    const voiceMembers  = new Map();  // id -> { name, speaking }
    const allVoiceUsers = new Map();  // id -> { name } siempre visible

    // ═══════════════════════════════════════════════════════════════
    // DOM
    // ═══════════════════════════════════════════════════════════════
    const form               = document.getElementById('form');
    const input              = document.getElementById('input');
    const messagesEl         = document.getElementById('messages');
    const voiceToggle        = document.getElementById('voice-toggle');
    const voiceStatusEl      = document.getElementById('voice-status');
    const voiceUsersList     = document.getElementById('voice-users-list');
    const screenToggle           = document.getElementById('screen-toggle');

    const voiceDot           = document.getElementById('voice-dot');

    // ═══════════════════════════════════════════════════════════════
    // TOAST DE CONEXIÓN
    // ═══════════════════════════════════════════════════════════════
    function showToast(msg, ok = false) {
      connToast.classList.add('show');
      toastMsg.textContent = msg;
      toastDot.className = 'toast-dot' + (ok ? ' green' : '');
      if (ok) setTimeout(() => connToast.classList.remove('show'), 2000);
    }
    function hideToast() { connToast.classList.remove('show'); }

    // ═══════════════════════════════════════════════════════════════
    // USERNAME
    // ═══════════════════════════════════════════════════════════════
    const usernameOverlay = document.getElementById('username-overlay');
    const usernameForm    = document.getElementById('username-form');
    const usernameInput   = document.getElementById('username-input');

    function applyUsername(name) {
      username = name.trim().slice(0, 20) || 'Invitado';
      localStorage.setItem('username', username);
      document.getElementById('user-avatar-icon').textContent = username.charAt(0).toUpperCase();
      document.getElementById('user-name-display').textContent = username;
      // Anunciar presencia si ya estamos conectados
      if (realtimeChannel) broadcastPresence();
    }

    if (!username) {
      usernameOverlay.style.display = 'flex';
    } else {
      applyUsername(username);
    }

    usernameForm.addEventListener('submit', e => {
      e.preventDefault();
      const v = usernameInput.value.trim();
      if (!v) return;
      applyUsername(v);
      usernameOverlay.style.display = 'none';
      if (!realtimeChannel) initRealtime();
    });

    document.getElementById('btn-rename').addEventListener('click', () => {
      localStorage.removeItem('username');
      location.reload();
    });

    // ═══════════════════════════════════════════════════════════════
    // MENSAJES UI
    // ═══════════════════════════════════════════════════════════════
    const shownMessages = new Set(); // evitar duplicados del historial + realtime

    function addMessage(payload) {
      const div = document.createElement('div');
      if (typeof payload === 'object' && payload.author) {
        // Deduplicar: si viene con ts (de DB) usarlo como key
        if (payload.ts) {
          if (shownMessages.has(payload.ts)) return;
          shownMessages.add(payload.ts);
        }
        div.className = 'message';
        const ts   = payload.ts ? new Date(payload.ts) : new Date();
        const time = ts.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
        const header = document.createElement('div');
        header.className = 'message-header';
        const authorEl = document.createElement('span');
        authorEl.className = 'message-author';
        authorEl.textContent = payload.author;
        const tsEl = document.createElement('span');
        tsEl.className = 'message-timestamp';
        tsEl.textContent = 'Hoy a las ' + time;
        header.appendChild(authorEl);
        header.appendChild(tsEl);
        const textEl = document.createElement('div');
        textEl.className = 'message-text';
        textEl.textContent = payload.text;
        div.appendChild(header);
        div.appendChild(textEl);
      } else {
        div.className = 'message system';
        const textEl = document.createElement('div');
        textEl.className = 'message-text';
        textEl.textContent = typeof payload === 'string' ? payload : '';
        div.appendChild(textEl);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ═══════════════════════════════════════════════════════════════
    // VOICE USERS UI
    // ═══════════════════════════════════════════════════════════════
    function renderVoiceUsers() {
      voiceUsersList.innerHTML = '';
      allVoiceUsers.forEach((info, id) => {
        const name = info?.name || 'Invitado';
        const speaking = voiceMembers.get(id)?.speaking || false;
        const row = document.createElement('div');
        row.className = 'voice-user';
        const avatar = document.createElement('div');
        avatar.className = 'voice-avatar' + (speaking ? ' speaking' : '');
        avatar.textContent = name.charAt(0).toUpperCase();
        const nameSpan = document.createElement('span');
        nameSpan.className = 'voice-user-name' + (speaking ? ' speaking' : '');
        nameSpan.textContent = name;
        const mic = document.createElement('span');
        mic.className = 'voice-mic-icon';
        mic.textContent = speaking ? '🎙️' : '🎤';
        row.appendChild(avatar);
        row.appendChild(nameSpan);
        row.appendChild(mic);
        voiceUsersList.appendChild(row);
      });
      // Actualizar dot y botón
      const connected = inVoice;
      voiceDot.classList.toggle('disconnected', !connected);
      voiceStatusEl.classList.toggle('disconnected', !connected);
      chanVoice.classList.toggle('active', connected);
    }

    // ═══════════════════════════════════════════════════════════════
    // SUPABASE REALTIME
    // - Presence: lista de usuarios en voz (fuente de verdad)
    // - Broadcast: señalización WebRTC y chat en tiempo real
    // - postgres_changes: chat persistente
    // ═══════════════════════════════════════════════════════════════
    function initRealtime() {
      showToast('Conectando al servidor...');

      realtimeChannel = sb.channel('server-amigos', {
        config: {
          broadcast: { self: false, ack: false },
          presence: { key: myId }
        }
      });

      // ── Presence: fuente de verdad para quién está en voz ──
      // sync se dispara cada vez que cambia cualquier presencia
      realtimeChannel.on('presence', { event: 'sync' }, () => {
        const state = realtimeChannel.presenceState();
        // Reconstruir allVoiceUsers desde el estado completo de presencia
        const newVoiceUsers = new Map();
        Object.entries(state).forEach(([key, presences]) => {
          const p = presences[0];
          if (p && p.inVoice) {
            newVoiceUsers.set(key, { name: p.name || 'Invitado' });
          }
        });

        // Detectar quién salió de voz para limpiar peers
        allVoiceUsers.forEach((_, id) => {
          if (!newVoiceUsers.has(id) && id !== myId) {
            voiceMembers.delete(id);
            cleanupPeer(id);
          }
        });

        // Detectar quién entró en voz para conectar
        newVoiceUsers.forEach((info, id) => {
          if (!allVoiceUsers.has(id) && id !== myId && inVoice) {
            voiceMembers.set(id, { name: info.name, speaking: false });
            callPeer(id);
          }
        });

        // Actualizar el mapa global
        allVoiceUsers.clear();
        newVoiceUsers.forEach((v, k) => allVoiceUsers.set(k, v));
        // Incluir siempre al usuario actual si está en voz
        if (inVoice) allVoiceUsers.set(myId, { name: username });

        renderVoiceUsers();
      });

      // ── Chat via DB Realtime (persistente) ──
      sb.channel('db-messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, ({ new: row }) => {
          addMessage({ author: row.author, text: row.text, ts: row.created_at });
        })
        .subscribe();

      // ── Señalización WebRTC via Broadcast ──
      realtimeChannel.on('broadcast', { event: 'webrtc-offer' }, ({ payload }) => {
        if (payload.to !== myId) return;
        handleOffer({ from: payload.from, sdp: payload.sdp });
      });

      realtimeChannel.on('broadcast', { event: 'webrtc-answer' }, ({ payload }) => {
        if (payload.to !== myId) return;
        handleAnswer({ from: payload.from, sdp: payload.sdp });
      });

      realtimeChannel.on('broadcast', { event: 'webrtc-ice' }, ({ payload }) => {
        if (payload.to !== myId) return;
        handleIceCandidate({ from: payload.from, candidate: payload.candidate });
      });

      realtimeChannel.subscribe(async (status) => {
        if (status === 'SUBSCRIBED') {
          showToast('Conectado', true);
          await loadHistory();
          // Anunciar presencia inicial (no en voz)
          await broadcastPresence();
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          showToast('Error de conexión. Recargando...');
          setTimeout(() => location.reload(), 3000);
        }
      });
    }

    async function broadcastPresence() {
      if (!realtimeChannel) return;
      // track() actualiza nuestra presencia — Presence sync se dispara en todos
      await realtimeChannel.track({ name: username, inVoice });
    }

    // ═══════════════════════════════════════════════════════════════
    // CHAT — persistente en Supabase
    // ═══════════════════════════════════════════════════════════════
    async function loadHistory() {
      const { data, error } = await sb
        .from('messages')
        .select('author, text, created_at')
        .order('created_at', { ascending: true })
        .limit(100);
      if (error) { console.warn('Error cargando historial:', error.message); return; }
      data.forEach(row => addMessage({ author: row.author, text: row.text, ts: row.created_at }));
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const text = input.value.trim().slice(0, 1000);
      if (!text) return;
      input.value = '';
      // Guardar en DB — el Realtime lo distribuye automáticamente a todos
      const { error } = await sb.from('messages').insert({ author: username, text });
      if (error) console.warn('Error enviando mensaje:', error.message);
    });

    // ═══════════════════════════════════════════════════════════════
    // SPEAKING MONITOR
    // ═══════════════════════════════════════════════════════════════
    function startSpeakingMonitor(stream) {
      if (audioContext) return;
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      micSource = audioContext.createMediaStreamSource(stream);
      analyser  = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      micSource.connect(analyser);
      function tick() {
        if (!analyser) return;
        analyser.getByteTimeDomainData(dataArray);
        let max = 0;
        for (let i = 0; i < dataArray.length; i++) max = Math.max(max, Math.abs(dataArray[i] - 128));
        const speaking = max > 20;
        const me = voiceMembers.get(myId);
        if (me && me.speaking !== speaking) {
          voiceMembers.set(myId, { ...me, speaking });
          renderVoiceUsers();
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // ═══════════════════════════════════════════════════════════════
    // WEBRTC
    // ═══════════════════════════════════════════════════════════════
    function patchSdpAudioQuality(sdp) {
      return sdp.replace(
        /a=fmtp:(\d+) useinbandfec=1/g,
        'a=fmtp:$1 useinbandfec=1;stereo=1;sprop-stereo=1;maxaveragebitrate=510000'
      );
    }

    async function applyBitratesToPeer(pc) {
      for (const sender of pc.getSenders()) {
        if (!sender.track) continue;
        const params = sender.getParameters();
        if (!params.encodings || !params.encodings.length) continue;
        if (sender.track.kind === 'audio') {
          params.encodings[0].maxBitrate = 510000;
          params.encodings[0].priority  = 'high';
          params.encodings[0].networkPriority = 'high';
        } else if (sender.track.kind === 'video') {
          const kbps = Number(screenBitrateKbps) || 15000;
          params.encodings[0].maxBitrate  = kbps * 1000;
          params.encodings[0].maxFramerate = 60;
          params.degradationPreference    = 'maintain-resolution';
          params.encodings[0].priority   = 'high';
          params.encodings[0].networkPriority = 'high';
        }
        await sender.setParameters(params).catch(() => {});
      }
    }

    function createPeerConnection(peerId) {
      if (peers[peerId]) return peers[peerId];
      const pc = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' },
        ],
        bundlePolicy: 'max-bundle',
        rtcpMuxPolicy: 'require',
      });

      pc.onnegotiationneeded = async () => {
        if (pc.signalingState !== 'stable') return;
        try {
          const offerRaw = await pc.createOffer();
          if (pc.signalingState !== 'stable') return;
          const patchedSdp = patchSdpAudioQuality(offerRaw.sdp);
          const offer = new RTCSessionDescription({ type: offerRaw.type, sdp: patchedSdp });
          await pc.setLocalDescription(offer);
          await realtimeChannel.send({
            type: 'broadcast', event: 'webrtc-offer',
            payload: { to: peerId, from: myId, sdp: offer }
          });
        } catch (e) { console.warn('onnegotiationneeded:', e.message); }
      };

      pc.onicecandidate = async (event) => {
        if (event.candidate) {
          await realtimeChannel.send({
            type: 'broadcast', event: 'webrtc-ice',
            payload: { to: peerId, from: myId, candidate: event.candidate }
          });
        }
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connected') {
          // Aplicar bitrates cuando la conexión está realmente establecida
          applyBitratesToPeer(pc);
        }
        if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
          delete peers[peerId];
          delete pendingCandidates[peerId];
        }
      };

      // Guardar tracks remotos por tipo para armar la card
      const remoteTracks = { audio: null, video: null };

      pc.ontrack = (event) => {
        const track = event.track;
        if (track.kind === 'audio') {
          remoteTracks.audio = track;
          // Si ya hay vídeo, actualizar la card con el audio
          if (remoteStreams[peerId]) {
            remoteStreams[peerId].audioTrack = track;
            const video = remoteStreams[peerId].card?.querySelector('.stream-video');
            if (video) {
              const tracks = [remoteStreams[peerId].videoTrack, track].filter(Boolean);
              video.srcObject = new MediaStream(tracks);
            }
          }
        } else if (track.kind === 'video') {
          remoteTracks.video = track;
          // Mostrar cuando el track tenga datos reales
          const show = () => {
            if (track.readyState === 'ended') return;
            upsertStreamCard(peerId, false, track, remoteTracks.audio);
          };
          if (track.readyState === 'live') show();
          track.onunmute = show;
          track.onended = () => removeStreamCard(peerId);
        }
      };

      peers[peerId] = pc;
      return pc;
    }

    async function ensureLocalStreamsForPeer(peerId) {
      const pc = createPeerConnection(peerId);
      // Audio del micrófono
      if (localStream) {
        localStream.getAudioTracks().forEach(track => {
          const already = pc.getSenders().some(s => s.track && s.track.id === track.id);
          if (!already) pc.addTrack(track, localStream);
        });
      }
      // Vídeo y audio del sistema (screenStream)
      if (screenStream) {
        screenStream.getTracks().forEach(track => {
          const already = pc.getSenders().some(s => s.track && s.track.id === track.id);
          if (!already) pc.addTrack(track, screenStream);
        });
      }
      return pc;
    }

    async function startLocalAudio() {
      if (localStream) return localStream;
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false, noiseSuppression: false,
          autoGainControl: false, sampleRate: 48000,
          sampleSize: 16, channelCount: 2,
        },
      });
      startSpeakingMonitor(localStream);
      return localStream;
    }

    async function callPeer(peerId) {
      await startLocalAudio();
      await ensureLocalStreamsForPeer(peerId);
    }

    async function handleOffer({ from, sdp }) {
      // Si recibimos un offer de alguien que no conocemos, añadirlo temporalmente
      if (!allVoiceUsers.has(from)) {
        allVoiceUsers.set(from, { name: voiceMembers.get(from)?.name || '...' });
        renderVoiceUsers();
      }
      await startLocalAudio();
      const pc = await ensureLocalStreamsForPeer(from);
      await pc.setRemoteDescription(new RTCSessionDescription(sdp));
      if (pendingCandidates[from]) {
        for (const c of pendingCandidates[from])
          await pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
        delete pendingCandidates[from];
      }
      const answerRaw = await pc.createAnswer();
      const patchedSdp = patchSdpAudioQuality(answerRaw.sdp);
      const answer = new RTCSessionDescription({ type: answerRaw.type, sdp: patchedSdp });
      await pc.setLocalDescription(answer);
      await applyBitratesToPeer(pc);
      await realtimeChannel.send({
        type: 'broadcast', event: 'webrtc-answer',
        payload: { to: from, from: myId, sdp: answer }
      });
    }

    async function handleAnswer({ from, sdp }) {
      const pc = peers[from];
      if (!pc) return;
      await pc.setRemoteDescription(new RTCSessionDescription(sdp));
      if (pendingCandidates[from]) {
        for (const c of pendingCandidates[from])
          await pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
        delete pendingCandidates[from];
      }
      await applyBitratesToPeer(pc);
    }

    async function handleIceCandidate({ from, candidate }) {
      const pc = peers[from];
      if (!pc || !pc.remoteDescription) {
        pendingCandidates[from] = pendingCandidates[from] || [];
        pendingCandidates[from].push(candidate);
        return;
      }
      await pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => {
        console.warn('ICE candidate descartado:', e.message);
      });
    }

    function cleanupPeer(id) {
      const pc = peers[id];
      if (pc) { pc.close(); delete peers[id]; }
      delete pendingCandidates[id];
      document.querySelectorAll(`[id^="audio-${id}"]`).forEach(el => el.parentNode?.removeChild(el));
    }

    // ═══════════════════════════════════════════════════════════════
    // VOZ
    // ═══════════════════════════════════════════════════════════════
    voiceToggle.addEventListener('click', async () => {
      if (inVoice) {
        leaveVoice();
      } else {
        try {
          if (!username) { alert('Pon un nombre de usuario primero.'); return; }
          await startLocalAudio();
          inVoice = true;
          // Añadirse localmente de inmediato para que aparezca en el sidebar
          allVoiceUsers.set(myId, { name: username });
          voiceMembers.set(myId, { name: username, speaking: false });
          voiceStatusEl.textContent = 'Conectado al canal de voz';
          voiceToggle.textContent = 'Salir de voz';
          voiceToggle.className = 'action-btn danger';
          renderVoiceUsers();
          // Actualizar Presence — esto dispara 'sync' en todos los demás
          // y ellos nos verán automáticamente en la lista
          await broadcastPresence();
          // Conectar con quienes ya estaban en voz
          allVoiceUsers.forEach((info, id) => {
            if (id === myId) return;
            voiceMembers.set(id, { name: info.name, speaking: false });
            callPeer(id);
          });
        } catch (err) {
          console.error(err);
          alert('No se pudo acceder al micrófono.');
          inVoice = false;
        }
      }
    });

    async function leaveVoice() {
      Object.keys(peers).forEach(id => cleanupPeer(id));
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
      if (audioContext) { audioContext.close(); audioContext = null; analyser = null; micSource = null; }
      inVoice = false;
      allVoiceUsers.delete(myId);
      voiceMembers.clear();
      voiceStatusEl.textContent = 'Desconectado';
      voiceToggle.textContent = 'Conectar';
      voiceToggle.className = 'action-btn primary';
      renderVoiceUsers();
      // Actualizar Presence — los demás nos verán desaparecer del canal de voz
      await broadcastPresence();
    }

    // ═══════════════════════════════════════════════════════════════
    // STREAMS — múltiples transmisiones simultáneas
    // Cada peer que transmite tiene su propia stream-card en el DOM
    // ═══════════════════════════════════════════════════════════════
    const streamsContainer = document.getElementById('streams-container');

    // Mapa de streams remotos: peerId -> { videoTrack, audioTrack, card, audioMuted, statsInterval }
    const remoteStreams = {};

    // ── Stats en tiempo real usando RTCPeerConnection.getStats() ──
    function startStatsMonitor(peerId) {
      if (remoteStreams[peerId]?.statsInterval) return;
      const entry = remoteStreams[peerId];
      if (!entry) return;

      let prevBytes = 0;
      let prevTs = 0;

      entry.statsInterval = setInterval(async () => {
        const statsEl = entry.card?.querySelector('.stream-stats');
        if (!statsEl) return;

        // Para el stream local: obtener settings del propio track
        if (peerId === 'local') {
          const track = entry.videoTrack;
          if (!track) return;
          const s = track.getSettings();
          const w = s.width || '?';
          const h = s.height || '?';
          const fps = s.frameRate ? Math.round(s.frameRate) : '?';
          // Calcular bitrate de subida desde el peer más cercano
          let bitrateStr = '';
          const pc = Object.values(peers)[0];
          if (pc) {
            try {
              const stats = await pc.getStats();
              stats.forEach(report => {
                if (report.type === 'outbound-rtp' && report.kind === 'video') {
                  const now = report.timestamp;
                  const bytes = report.bytesSent;
                  if (prevTs && prevBytes) {
                    const kbps = Math.round(((bytes - prevBytes) * 8) / (now - prevTs));
                    bitrateStr = ` · ${kbps} kbps`;
                  }
                  prevBytes = bytes;
                  prevTs = now;
                }
              });
            } catch (_) {}
          }
          statsEl.textContent = `${w}x${h} ${fps}fps${bitrateStr}`;
          return;
        }

        // Para streams remotos: getStats() del peer correspondiente
        const pc = peers[peerId];
        if (!pc) return;
        try {
          const stats = await pc.getStats();
          let w = '?', h = '?', fps = '?', kbpsStr = '';
          stats.forEach(report => {
            if (report.type === 'inbound-rtp' && report.kind === 'video') {
              if (report.frameWidth)  w   = report.frameWidth;
              if (report.frameHeight) h   = report.frameHeight;
              if (report.framesPerSecond) fps = Math.round(report.framesPerSecond);
              const now   = report.timestamp;
              const bytes = report.bytesReceived;
              if (prevTs && prevBytes) {
                const kbps = Math.round(((bytes - prevBytes) * 8) / (now - prevTs));
                kbpsStr = ` · ${kbps} kbps`;
              }
              prevBytes = bytes;
              prevTs    = now;
            }
          });
          statsEl.textContent = `${w}x${h} ${fps}fps${kbpsStr}`;
        } catch (_) {}
      }, 1000);
    }

    function stopStatsMonitor(peerId) {
      const entry = remoteStreams[peerId];
      if (!entry?.statsInterval) return;
      clearInterval(entry.statsInterval);
      entry.statsInterval = null;
    }

    // Crear o actualizar la card de un stream
    function upsertStreamCard(peerId, isLocal, videoTrack, audioTrack) {
      // Reutilizar si ya existe
      if (remoteStreams[peerId]?.card) {
        // Actualizar tracks si cambiaron
        const entry = remoteStreams[peerId];
        if (videoTrack) entry.videoTrack = videoTrack;
        if (audioTrack) entry.audioTrack = audioTrack;
        const video = entry.card.querySelector('.stream-video');
        if (video && videoTrack) video.srcObject = new MediaStream([videoTrack]);
        return;
      }

      const authorName = isLocal ? username : (allVoiceUsers.get(peerId)?.name || 'Alguien');
      const entry = { videoTrack, audioTrack, card: null, audioMuted: false, statsInterval: null };
      remoteStreams[peerId] = entry;

      const card = document.createElement('div');
      card.className = 'stream-card';
      card.id = `stream-${peerId}`;

      // Header (aparece al hover)
      card.innerHTML = `
        <div class="stream-card-header">
          <span class="screen-live-badge"><span class="screen-live-dot"></span>EN VIVO</span>
          <span class="stream-author">${authorName}</span>
          <span class="stream-stats"></span>
        </div>
        <video class="stream-video" autoplay playsinline ${isLocal ? 'muted' : ''}></video>
        <div class="stream-card-footer">
          ${!isLocal ? `<button class="stream-ctrl-btn" data-mute>🔊 Audio</button>` : ''}
          <button class="stream-ctrl-btn" data-fs>⤢ Pantalla completa</button>
          ${isLocal ? `<button class="stream-ctrl-btn danger" data-stop>✕ Dejar de transmitir</button>` : `<button class="stream-ctrl-btn danger" data-leave>↩ Salir</button>`}
        </div>
      `;

      const video = card.querySelector('.stream-video');
      video.srcObject = new MediaStream([videoTrack, ...(audioTrack ? [audioTrack] : [])]);

      // Botón mute/unmute audio (solo espectador)
      const muteBtn = card.querySelector('[data-mute]');
      if (muteBtn) {
        muteBtn.addEventListener('click', () => {
          entry.audioMuted = !entry.audioMuted;
          video.muted = entry.audioMuted;
          muteBtn.textContent = entry.audioMuted ? '🔇 Audio' : '🔊 Audio';
          muteBtn.classList.toggle('muted', entry.audioMuted);
        });
      }

      // Fullscreen
      card.querySelector('[data-fs]').addEventListener('click', async () => {
        if (document.fullscreenElement) {
          await document.exitFullscreen().catch(() => {});
        } else {
          await video.requestFullscreen().catch(() => {});
        }
      });
      video.addEventListener('dblclick', async () => {
        if (document.fullscreenElement) await document.exitFullscreen().catch(() => {});
        else await video.requestFullscreen().catch(() => {});
      });

      // Dejar de transmitir (emisor) / Salir de la vista (espectador)
      const stopBtn = card.querySelector('[data-stop]');
      const leaveBtn = card.querySelector('[data-leave]');
      if (stopBtn) stopBtn.addEventListener('click', stopScreenShare);
      if (leaveBtn) leaveBtn.addEventListener('click', () => removeStreamCard(peerId));

      entry.card = card;
      streamsContainer.appendChild(card);
      startStatsMonitor(peerId);
    }

    function removeStreamCard(peerId) {
      stopStatsMonitor(peerId);
      const entry = remoteStreams[peerId];
      if (entry?.card) { entry.card.remove(); }
      delete remoteStreams[peerId];
    }

    async function startScreenShare() {
      if (screenStream) return;
      try {
        const resValue = screenResolutionSelect.value || '1920x1080';
        const [w, h] = resValue.split('x').map(v => parseInt(v, 10));
        const kbps = Number(screenBitrateInput.value) || 20000;
        screenBitrateKbps = Math.max(1000, Math.min(kbps, 100000));

        screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: { width: { ideal: w, max: w }, height: { ideal: h, max: h }, frameRate: { ideal: 60, max: 60 } },
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: 48000, channelCount: 2 },
        });

        const videoTrack = screenStream.getVideoTracks()[0];
        const audioTrack = screenStream.getAudioTracks()[0] || null;
        if (videoTrack) videoTrack.addEventListener('ended', () => stopScreenShare());

        // Mostrar preview local
        upsertStreamCard('local', true, videoTrack, audioTrack);

        // Enviar a todos los peers
        for (const peerId of Object.keys(peers)) await ensureLocalStreamsForPeer(peerId);
        screenToggle.textContent = '🖥 Detener';
      } catch (err) {
        console.error(err);
        screenStream = null;
      }
    }

    function stopScreenShare() {
      if (!screenStream) return;
      // Parar todos los tracks de pantalla — el evento 'ended' del track
      // hará que el receptor detecte automáticamente que el stream terminó
      screenStream.getTracks().forEach(t => t.stop());
      screenStream = null;
      removeStreamCard('local');
      screenToggle.textContent = '🖥 Pantalla';
      // Eliminar los senders de vídeo para no dejar tracks "muertos" en la conexión
      Object.values(peers).forEach(pc => {
        pc.getSenders()
          .filter(s => s.track && s.track.kind === 'video')
          .forEach(sender => {
            try { pc.removeTrack(sender); } catch (_) {}
          });
      });
    }

    screenToggle.addEventListener('click', async () => {
      if (!inVoice) { alert('Primero conéctate al canal de voz.'); return; }
      if (screenStream) stopScreenShare(); else await startScreenShare();
    });

    // Presets de bitrate por resolución
    const RESOLUTION_BITRATE = {
      '854x480':   3000,
      '1280x720':  8000,
      '1920x1080': 20000,
      '3840x2160': 100000,
    };

    screenResolutionSelect.addEventListener('change', () => {
      const preset = RESOLUTION_BITRATE[screenResolutionSelect.value];
      if (preset) {
        screenBitrateInput.value = preset;
        // Sincronizar el select de preset con el valor más cercano o "personalizado"
        const option = screenBitratePreset.querySelector(`option[value="${preset}"]`);
        if (option) screenBitratePreset.value = preset;
        else screenBitratePreset.value = '20000';
      }
    });

    screenBitratePreset.addEventListener('change', () => {
      screenBitrateInput.value = screenBitratePreset.value;
    });

    screenApplyButton.addEventListener('click', async () => {
      const kbps = Number(screenBitrateInput.value) || 20000;
      screenBitrateKbps = Math.max(1000, Math.min(kbps, 100000));
      const resValue = screenResolutionSelect.value || '1920x1080';
      const [w, h] = resValue.split('x').map(v => parseInt(v, 10));

      if (!screenStream) {
        addMessage('[Sistema] Configuración guardada. Se aplicará al iniciar la pantalla compartida.');
        return;
      }

      // Intentar cambiar resolución/constraints del track activo sin abrir nuevo diálogo
      const currentTrack = screenStream.getVideoTracks()[0];
      if (currentTrack) {
        try {
          await currentTrack.applyConstraints({
            width: { ideal: w, max: w },
            height: { ideal: h, max: h },
            frameRate: { ideal: 60, max: 60 },
          });
        } catch (_) { /* algunos navegadores no soportan applyConstraints en getDisplayMedia */ }
      }

      // Actualizar bitrate en todos los peers activos
      for (const pc of Object.values(peers)) await applyBitratesToPeer(pc);

      addMessage('[Sistema] Bitrate actualizado. La resolución se aplicará si el navegador lo permite.');
    });

    // Fullscreen gestionado dentro de cada stream-card individualmente

    // ═══════════════════════════════════════════════════════════════
    // MENÚ RESPONSIVO — sidebars en móvil / tablet
    // ═══════════════════════════════════════════════════════════════
    const sidebarEl       = document.querySelector('.channels-sidebar');
    const rightPanelEl    = document.querySelector('.right-panel');
    const overlayEl       = document.getElementById('sidebar-overlay');
    const btnSidebarToggle  = document.getElementById('btn-sidebar-toggle');
    const btnSettingsToggle = document.getElementById('btn-settings-toggle');

    function closeAllDrawers() {
      sidebarEl.classList.remove('open');
      rightPanelEl.classList.remove('open');
      overlayEl.classList.remove('show');
    }

    btnSidebarToggle?.addEventListener('click', () => {
      const opening = !sidebarEl.classList.contains('open');
      closeAllDrawers();
      if (opening) {
        sidebarEl.classList.add('open');
        overlayEl.classList.add('show');
      }
    });

    btnSettingsToggle?.addEventListener('click', () => {
      const opening = !rightPanelEl.classList.contains('open');
      closeAllDrawers();
      if (opening) {
        rightPanelEl.classList.add('open');
        overlayEl.classList.add('show');
      }
    });

    overlayEl?.addEventListener('click', closeAllDrawers);

    // Cerrar drawer al seleccionar un canal (móvil)
    document.querySelectorAll('.channel-item').forEach(el => {
      el.addEventListener('click', () => {
        if (window.innerWidth <= 720) closeAllDrawers();
      });
    });

    // ═══════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════
    if (username) initRealtime();
  </script>
</body>
</html>
