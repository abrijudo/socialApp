<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Discord — Servidor amigos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-tertiary:   #1e2124;
      --bg-secondary:  #2f3136;
      --bg-primary:    #36393f;
      --bg-floating:   #18191c;
      --channelbg-hover: #34373c;
      --channelbg-active: #3a3c42;
      --text-normal:   #dcddde;
      --text-muted:    #72767d;
      --header-primary: #ffffff;
      --header-secondary: #b9bbbe;
      --interactive-normal: #b9bbbe;
      --interactive-hover: #dcddde;
      --interactive-active: #ffffff;
      --brand:         #5865f2;
      --brand-hover:   #4752c4;
      --green:         #3ba55c;
      --red:           #ed4245;
      --border:        #202225;
      --scrollbar:     #202225;
      --input-bg:      #40444b;
      --msg-hover:     rgba(4,4,5,0.07);
      --radius:        4px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-normal);
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* ── Server rail ── */
    .server-rail {
      width: 72px; min-width: 72px;
      background: var(--bg-tertiary);
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0; gap: 8px; overflow-y: auto;
    }
    .server-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: white; cursor: pointer;
      transition: border-radius .15s, background .15s; position: relative; flex-shrink: 0;
    }
    .server-icon:hover { border-radius: 16px; background: var(--brand-hover); }
    .server-icon.active { border-radius: 16px; }
    .server-icon.active::before {
      content: ''; position: absolute; left: -16px;
      width: 4px; height: 40px; background: white; border-radius: 0 4px 4px 0;
    }
    .server-separator { width: 32px; height: 2px; background: var(--bg-secondary); border-radius: 1px; }

    /* ── Channels sidebar ── */
    .channels-sidebar {
      width: 240px; min-width: 240px;
      background: var(--bg-secondary);
      display: flex; flex-direction: column;
    }
    .server-header {
      height: 48px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); cursor: pointer;
      font-weight: 600; font-size: 15px; color: var(--header-primary);
      flex-shrink: 0; box-shadow: 0 1px 0 rgba(0,0,0,.2);
    }
    .server-header:hover { background: var(--channelbg-hover); }
    .server-header-arrow { color: var(--interactive-normal); font-size: 11px; }
    .channels-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .channel-category {
      padding: 16px 8px 4px 8px;
      display: flex; align-items: center; gap: 4px; cursor: pointer;
    }
    .channel-category-name {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .02em; color: var(--text-muted);
    }
    .channel-item {
      display: flex; align-items: center; gap: 6px;
      padding: 1px 8px; margin: 0 8px; border-radius: var(--radius);
      cursor: pointer; color: var(--text-muted);
      font-size: 15px; font-weight: 500; height: 34px;
      transition: background .05s, color .05s;
    }
    .channel-item:hover { background: var(--channelbg-hover); color: var(--interactive-hover); }
    .channel-item.active { background: var(--channelbg-active); color: var(--interactive-active); }
    .channel-item-icon { font-size: 18px; width: 20px; text-align: center; flex-shrink: 0; }

    /* voice members */
    .voice-members-section { padding: 4px 0 8px; }
    .voice-user {
      display: flex; align-items: center; gap: 8px;
      padding: 1px 8px 1px 28px; margin: 0 8px;
      border-radius: var(--radius); height: 32px;
    }
    .voice-user:hover { background: var(--channelbg-hover); }
    .voice-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      flex-shrink: 0; position: relative;
    }
    .voice-avatar.speaking::after {
      content: ''; position: absolute; inset: -2px;
      border-radius: 50%; border: 2px solid var(--green);
      animation: speakPulse .8s ease infinite;
    }
    @keyframes speakPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .voice-user-name { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .voice-user-name.speaking { color: var(--green); }
    .voice-mic-icon { margin-left: auto; font-size: 12px; color: var(--text-muted); }

    /* user panel */
    .user-panel {
      height: 52px; background: var(--bg-floating);
      display: flex; align-items: center; padding: 0 8px; gap: 8px; flex-shrink: 0;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 13px; font-weight: 600; color: var(--header-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-tag { font-size: 11px; color: var(--text-muted); }
    .user-actions { display: flex; gap: 2px; }
    .user-action-btn {
      width: 32px; height: 32px; border-radius: var(--radius);
      border: none; background: transparent; color: var(--interactive-normal);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; padding: 0; transition: background .1s, color .1s;
    }
    .user-action-btn:hover { background: var(--channelbg-hover); color: var(--interactive-hover); }

    /* voice status bar */
    .voice-status-bar {
      background: #36393f; border-top: 1px solid var(--border);
      padding: 8px 12px; flex-shrink: 0;
    }
    .voice-connected-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .voice-connected-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
    .voice-connected-dot.disconnected { background: var(--text-muted); }
    .voice-connected-label { font-size: 12px; font-weight: 600; color: var(--green); flex: 1; }
    .voice-connected-label.disconnected { color: var(--text-muted); }
    .action-btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn-row .action-btn { flex: 1; }
    .action-btn.icon-btn { flex: 0 0 auto; width: 40px; padding: 8px 0; font-size: 16px; }
    .action-btn.muted { background: var(--red); color: white; }
    .action-btn.muted:hover { filter: brightness(1.1); }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .action-btn {
      width: 100%; padding: 8px 0; border-radius: var(--radius); border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .1s, filter .1s; font-family: inherit;
    }
    .action-btn.primary { background: var(--brand); color: white; }
    .action-btn.primary:hover { background: var(--brand-hover); }
    .action-btn.danger { background: var(--red); color: white; }
    .action-btn.danger:hover { filter: brightness(1.1); }
    .action-btn.secondary { background: var(--bg-floating); color: var(--text-normal); border: 1px solid var(--border); }
    .action-btn.secondary:hover { background: var(--channelbg-hover); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-primary); }
    .topbar {
      height: 48px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
      flex-shrink: 0; box-shadow: 0 1px 0 rgba(0,0,0,.2);
    }
    .topbar-icon { font-size: 20px; color: var(--text-muted); }
    .topbar-channel-name { font-size: 15px; font-weight: 600; color: var(--header-primary); }
    .topbar-separator { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
    .topbar-topic { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* streams grid */
    #streams-container {
      display: flex; flex-direction: column; gap: 0;
      max-height: 45vh; overflow-y: auto;
    }
    #streams-container:empty { display: none; }

    .stream-card {
      position: relative; background: #000;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stream-card-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 6px 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,.75), transparent);
      display: flex; align-items: center; gap: 6px;
      z-index: 2; opacity: 1; transition: opacity .2s;
    }
    /* En hover la cabecera muestra también las stats completas (siempre visible, más opaca en hover) */
    .stream-card:hover .stream-card-header { opacity: 1; }
    .stream-card-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 10px;
      background: linear-gradient(to top, rgba(0,0,0,.75), transparent);
      display: flex; align-items: center; gap: 6px;
      z-index: 2; opacity: 0; transition: opacity .2s;
    }
    .stream-card:hover .stream-card-footer { opacity: 1; }

    .screen-live-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--red); color: white;
      font-size: 10px; font-weight: 700; letter-spacing: .05em;
      padding: 2px 6px; border-radius: 3px;
    }
    .screen-live-dot {
      width: 5px; height: 5px; border-radius: 50%; background: white;
      animation: livePulse 1.2s ease infinite;
    }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    .stream-author {
      font-size: 12px; font-weight: 600; color: white;
    }
    .stream-stats {
      font-size: 10px; color: rgba(255,255,255,.6); font-family: monospace; margin-left: auto;
    }
    .stream-ctrl-btn {
      height: 26px; padding: 0 8px; border-radius: var(--radius); border: none;
      background: rgba(255,255,255,.15); color: white;
      font-size: 11px; font-weight: 500; cursor: pointer; transition: background .1s;
      font-family: inherit;
    }
    .stream-ctrl-btn:hover { background: rgba(255,255,255,.3); }
    .stream-ctrl-btn.danger { background: rgba(237,66,69,.5); }
    .stream-ctrl-btn.danger:hover { background: rgba(237,66,69,.8); }
    .stream-ctrl-btn.muted { background: rgba(255,255,255,.08); color: rgba(255,255,255,.45); }

    .stream-video {
      width: 100%; height: auto; display: block;
      object-fit: contain; background: #000;
      max-height: 72vh;
    }
    .stream-video:fullscreen, .stream-video:-webkit-full-screen {
      width: 100vw !important; height: 100vh !important;
      max-height: none !important; object-fit: contain !important;
    }

    /* Overlay "Transmisión terminada" */
    .stream-ended-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.75);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; z-index: 4;
    }
    .stream-ended-overlay span { color: rgba(255,255,255,.7); font-size: 14px; }
    .stream-ended-overlay button {
      padding: 8px 20px; border-radius: var(--radius); border: none;
      background: var(--brand); color: white; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .1s;
    }
    .stream-ended-overlay button:hover { background: var(--brand-hover); }

    /* messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px 0 8px; display: flex; flex-direction: column; }
    .message { padding: 2px 16px; display: flex; flex-direction: column; transition: background .05s; }
    .message:hover { background: var(--msg-hover); }
    .message-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .message-author { font-size: 15px; font-weight: 500; color: var(--header-primary); cursor: pointer; }
    .message-author:hover { text-decoration: underline; }
    .message-timestamp { font-size: 11px; color: var(--text-muted); }
    .message-text { font-size: 15px; line-height: 1.375; color: var(--text-normal); word-wrap: break-word; }
    .message.system .message-text { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 4px 0; }

    /* input */
    .input-area { padding: 0 16px 24px; flex-shrink: 0; }
    .input-box {
      background: var(--input-bg); border-radius: 8px;
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
    }
    .input-box input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text-normal); font-size: 15px; font-family: inherit;
      padding: 11px 0; line-height: 1.375;
    }
    .input-box input::placeholder { color: var(--text-muted); }
    .input-send-btn {
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 20px; padding: 0; line-height: 1; transition: color .1s;
    }
    .input-send-btn:hover { color: var(--interactive-hover); background: transparent; }

    /* ── Right panel ── */
    .right-panel { width: 240px; min-width: 240px; background: var(--bg-secondary); display: flex; flex-direction: column; }
    .right-panel-section { padding: 16px 8px 8px; }
    .right-panel-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .02em; color: var(--text-muted); padding: 0 8px 6px;
    }
    .screen-controls-panel { padding: 8px; display: flex; flex-direction: column; gap: 8px; }
    .ctrl-row { display: flex; align-items: center; gap: 8px; }
    .ctrl-label { font-size: 11px; color: var(--text-muted); min-width: 50px; }
    .ctrl-select {
      flex: 1; background: var(--bg-floating); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-normal);
      padding: 4px 8px; font-size: 12px; outline: none; cursor: pointer;
    }
    .ctrl-select:hover { border-color: var(--brand); }
    .ctrl-input {
      width: 80px; background: var(--bg-floating); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-normal);
      padding: 4px 8px; font-size: 12px; outline: none;
    }
    .ctrl-input:hover, .ctrl-input:focus { border-color: var(--brand); }

    /* ── Username overlay ── */
    .username-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    .username-card {
      background: var(--bg-secondary); border-radius: 8px; padding: 32px;
      width: 100%; max-width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .username-card h2 { font-size: 24px; font-weight: 700; color: var(--header-primary); text-align: center; margin-bottom: 8px; }
    .username-card p { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 24px; }
    .username-card label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .02em; color: var(--header-secondary); margin-bottom: 8px; }
    .username-card input {
      width: 100%; padding: 10px 12px; background: var(--bg-floating);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text-normal); font-size: 16px; font-family: inherit;
      outline: none; margin-bottom: 20px;
    }
    .username-card input:focus { border-color: var(--brand); }
    .username-card input::placeholder { color: var(--text-muted); }
    .username-card button {
      width: 100%; padding: 12px; background: var(--brand); color: white;
      border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .username-card button:hover { background: var(--brand-hover); }

    /* connection status toast */
    #conn-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #18191c; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 20px; font-size: 13px; color: var(--text-muted);
      display: none; z-index: 200; gap: 8px; align-items: center;
      white-space: nowrap; max-width: calc(100vw - 32px);
    }
    #conn-toast.show { display: flex; }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: livePulse 1s infinite; }
    .toast-dot.green { background: var(--green); animation: none; }

    /* ── Botones de menú móvil ── */
    .topbar-menu-btn {
      display: none; background: transparent; border: none;
      color: var(--interactive-normal); font-size: 20px;
      cursor: pointer; padding: 4px; border-radius: var(--radius);
      line-height: 1; flex-shrink: 0;
    }
    .topbar-menu-btn:hover { color: var(--interactive-hover); background: var(--channelbg-hover); }

    /* Overlay oscuro para cerrar sidebar en móvil */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 49;
    }
    #sidebar-overlay.show { display: block; }

    /* ══════════════════════════════════════
       RESPONSIVE — Tablet (< 1100px)
    ══════════════════════════════════════ */
    @media (max-width: 1100px) {
      .right-panel { display: none; }
      /* Panel derecho como drawer desde la derecha */
      .right-panel.open {
        display: flex; position: fixed; right: 0; top: 0; bottom: 0;
        z-index: 50; box-shadow: -4px 0 20px rgba(0,0,0,.5);
      }
      .topbar-menu-btn.settings-btn { display: flex; align-items: center; justify-content: center; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — Móvil (< 720px)
    ══════════════════════════════════════ */
    @media (max-width: 720px) {
      /* Ocultar rail de servidores (poco espacio) */
      .server-rail { display: none; }

      /* Sidebar izquierdo como drawer desde la izquierda */
      .channels-sidebar {
        display: none; position: fixed; left: 0; top: 0; bottom: 0;
        z-index: 50; width: min(280px, 85vw);
        box-shadow: 4px 0 20px rgba(0,0,0,.5);
      }
      .channels-sidebar.open { display: flex; }

      /* Mostrar botón hamburguesa */
      .topbar-menu-btn.sidebar-btn { display: flex; align-items: center; justify-content: center; }

      /* Topbar más compacta */
      .topbar { padding: 0 10px; gap: 8px; }
      .topbar-separator, .topbar-topic { display: none; }

      /* Chat input más cómodo */
      .input-area { padding: 0 8px 16px; }

      /* Mensajes con menos padding lateral */
      .message { padding: 2px 10px; }

      /* Stream video más alto en móvil */
      .stream-video { max-height: 55vw; min-height: 120px; }
      #streams-container { max-height: 60vw; }

      /* Username card */
      .username-card { padding: 24px 16px; margin: 0 12px; }
      .username-card h2 { font-size: 20px; }

      /* Font base más pequeña */
      body { font-size: 13px; }
      .message-author, .message-text { font-size: 14px; }
      .input-box input { font-size: 14px; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — Pantallas muy pequeñas (< 400px)
    ══════════════════════════════════════ */
    @media (max-width: 400px) {
      .channels-sidebar { width: 92vw; }
      .stream-video { max-height: 50vw; }
      .action-btn { font-size: 12px; padding: 6px 0; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — Pantallas grandes (>= 1440px)
    ══════════════════════════════════════ */
    @media (min-width: 1440px) {
      .channels-sidebar { width: 260px; min-width: 260px; }
      .right-panel { width: 260px; min-width: 260px; }
      .stream-video { max-height: 35vh; }
    }
  </style>
</head>
<body>

  <!-- Server rail -->
  <div class="server-rail">
    <div class="server-icon active" title="Servidor amigos">A</div>
    <div class="server-separator"></div>
  </div>

  <!-- Channels sidebar -->
  <div class="channels-sidebar">
    <div class="server-header">
      Servidor amigos <span class="server-header-arrow">▼</span>
    </div>
    <div class="channels-list">
      <div class="channel-category">
        <span class="channel-category-name">Canales de texto</span>
      </div>
      <div class="channel-item active" id="chan-general">
        <span class="channel-item-icon">#</span> general
      </div>
      <div class="channel-category" style="margin-top:8px;">
        <span class="channel-category-name">Canales de voz</span>
      </div>
      <div class="channel-item" id="chan-voice">
        <span class="channel-item-icon">🔊</span> general
      </div>
      <div class="voice-members-section">
        <div id="voice-users-list"></div>
      </div>
    </div>

    <div class="voice-status-bar">
      <div class="voice-connected-header">
        <div class="voice-connected-dot disconnected" id="voice-dot"></div>
        <span class="voice-connected-label disconnected" id="voice-status">Desconectado</span>
      </div>
      <div class="action-btn-row">
        <button class="action-btn primary" id="voice-toggle">Conectar</button>
        <button class="action-btn secondary icon-btn" id="mic-toggle" title="Silenciar/Activar micrófono" disabled>🎤</button>
        <button class="action-btn secondary icon-btn" id="screen-toggle" title="Compartir pantalla" disabled>🖥</button>
      </div>
    </div>

    <div class="user-panel">
      <div class="user-avatar" id="user-avatar-icon">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name-display">—</div>
        <div class="user-tag">#0001</div>
      </div>
      <div class="user-actions">
        <button class="user-action-btn" title="Cambiar nombre" id="btn-rename">✏️</button>
      </div>
    </div>
  </div>

  <!-- Overlay para cerrar sidebars en móvil -->
  <div id="sidebar-overlay"></div>

  <!-- Main chat area -->
  <div class="main">
    <div class="topbar">

  <!-- Supabase SDK -->

  <script src="/livekit-client.js"></script>
  <script>
    // ═══════════════════════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════════════════════
    const SUPABASE_URL  = 'https://twlqfiatocyeasmnatzj.supabase.co';
    const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3bHFmaWF0b2N5ZWFzbW5hdHpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDc5NTEsImV4cCI6MjA4ODYyMzk1MX0.hosd2PCXszVxMeuqfgDb94sTZcF20BYvNptfsVl1qxk';
    const TOKEN_URL     = '/api/token';
    const ROOM_NAME     = 'general';
    const VOICE_REJOIN_STORAGE_KEY = 'voice-rejoin-on-reload';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ═══════════════════════════════════════════════════════════════
    // ESTADO GLOBAL
    // ═══════════════════════════════════════════════════════════════
    let username = localStorage.getItem('username') || '';
    let inVoice  = false;
    let room     = null;   // LiveKit Room
    let screenBitrateKbps  = 15000;
    let _screenVideoTrack  = null;  // LocalVideoTrack activo
    let _screenAudioTrack  = null;  // LocalAudioTrack de audio del sistema
    let _presenceChannel   = null;  // Supabase Presence para ver quién está en voz
    let _screenAdaptInterval = null; // controlador dinámico de bitrate para pantalla

    // ═══════════════════════════════════════════════════════════════
    // DOM
    // ═══════════════════════════════════════════════════════════════
    const form               = document.getElementById('form');
    const input              = document.getElementById('input');
    const messagesEl         = document.getElementById('messages');
    const voiceToggle        = document.getElementById('voice-toggle');
    const micToggle          = document.getElementById('mic-toggle');
    const voiceStatusEl      = document.getElementById('voice-status');
    const voiceUsersList     = document.getElementById('voice-users-list');
    const screenToggle           = document.getElementById('screen-toggle');
    const voiceDot           = document.getElementById('voice-dot');
    const chanVoice          = document.getElementById('chan-voice');
    const connToast          = document.getElementById('conn-toast');
    const toastDot           = document.getElementById('toast-dot');
    const toastMsg           = document.getElementById('toast-msg');
    const streamsContainer   = document.getElementById('streams-container');

    // ═══════════════════════════════════════════════════════════════
    // TOAST DE CONEXIÓN
    // ═══════════════════════════════════════════════════════════════
    function showToast(msg, ok = false) {
      connToast.classList.add('show');
      toastMsg.textContent = msg;
      toastDot.className = 'toast-dot' + (ok ? ' green' : '');
      if (ok) setTimeout(() => connToast.classList.remove('show'), 2000);
    }
    function hideToast() { connToast.classList.remove('show'); }

    // ═══════════════════════════════════════════════════════════════
    // USERNAME
    // ═══════════════════════════════════════════════════════════════
    const usernameOverlay = document.getElementById('username-overlay');
    const usernameForm    = document.getElementById('username-form');
    const usernameInput   = document.getElementById('username-input');

    function applyUsername(name) {
      username = name.trim().slice(0, 20) || 'Invitado';
      localStorage.setItem('username', username);
      document.getElementById('user-avatar-icon').textContent = username.charAt(0).toUpperCase();
      document.getElementById('user-name-display').textContent = username;
    }

    if (!username) {
      usernameOverlay.style.display = 'flex';
    } else {
      applyUsername(username);
    }

    usernameForm.addEventListener('submit', e => {
      e.preventDefault();
      const v = usernameInput.value.trim();
      if (!v) return;
      applyUsername(v);
      usernameOverlay.style.display = 'none';
      initChat();
      initPresence();
    });

    document.getElementById('btn-rename').addEventListener('click', () => {
      localStorage.removeItem(VOICE_REJOIN_STORAGE_KEY);
      localStorage.removeItem('username');
      location.reload();
    });

    // ═══════════════════════════════════════════════════════════════
    // CHAT — Supabase (persistente, solo mensajes de texto)
    // ═══════════════════════════════════════════════════════════════
    const shownMessages = new Set(); // evitar duplicados del historial + realtime

    function formatMessageTimestamp(ts) {
      const now = new Date();
      const msgDate = new Date(ts);
      const time = msgDate.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const msgDayStart = new Date(msgDate.getFullYear(), msgDate.getMonth(), msgDate.getDate());
      const dayDiff = Math.round((todayStart - msgDayStart) / 86400000);

      if (dayDiff === 0) return `Hoy a las ${time}`;
      if (dayDiff === 1) return `Ayer a las ${time}`;

      const date = msgDate.toLocaleDateString('es-ES', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
      });
      return `${date} a las ${time}`;
    }

    function addMessage(payload) {
      const div = document.createElement('div');
      if (typeof payload === 'object' && payload.author) {
        // Deduplicar: si viene con ts (de DB) usarlo como key
        if (payload.ts) {
          if (shownMessages.has(payload.ts)) return;
          shownMessages.add(payload.ts);
        }
        div.className = 'message';
        const ts = payload.ts ? new Date(payload.ts) : new Date();
        const header = document.createElement('div');
        header.className = 'message-header';
        const authorEl = document.createElement('span');
        authorEl.className = 'message-author';
        authorEl.textContent = payload.author;
        const tsEl = document.createElement('span');
        tsEl.className = 'message-timestamp';
        tsEl.textContent = formatMessageTimestamp(ts);
        header.appendChild(authorEl);
        header.appendChild(tsEl);
        const textEl = document.createElement('div');
        textEl.className = 'message-text';
        textEl.textContent = payload.text;
        div.appendChild(header);
        div.appendChild(textEl);
      } else {
        div.className = 'message system';
        const textEl = document.createElement('div');
        textEl.className = 'message-text';
        textEl.textContent = typeof payload === 'string' ? payload : '';
        div.appendChild(textEl);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ═══════════════════════════════════════════════════════════════
    // SUPABASE — solo chat de texto
    // ═══════════════════════════════════════════════════════════════
    function initChat() {
      sb.channel('db-messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, ({ new: row }) => {
          addMessage({ author: row.author, text: row.text, ts: row.created_at });
        })
        .subscribe();
      loadHistory();
    }

    async function loadHistory() {
      const { data, error } = await sb
        .from('messages').select('author, text, created_at')
        .order('created_at', { ascending: true }).limit(100);
      if (error) { console.warn('Error cargando historial:', error.message); return; }
      data.forEach(row => addMessage({ author: row.author, text: row.text, ts: row.created_at }));
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const text = input.value.trim().slice(0, 1000);
      if (!text || !username) return;
      input.value = '';
      const { error } = await sb.from('messages').insert({ author: username, text });
      if (error) console.warn('Error enviando mensaje:', error.message);
    });

    // ═══════════════════════════════════════════════════════════════
    // PRESENCE — quién está en voz (visible para todos, no solo quien está dentro)
    // ═══════════════════════════════════════════════════════════════
    let presenceVoiceUsers = []; // [{ name }] actualizado por Supabase Presence

    function initPresence() {
      if (_presenceChannel) return;
      _presenceChannel = sb.channel('voice-presence', {
        config: { presence: { key: username } },
      });

      _presenceChannel
        .on('presence', { event: 'sync' }, () => {
          const state = _presenceChannel.presenceState();
          presenceVoiceUsers = Object.values(state)
            .flat()
            .filter(p => p.inVoice)
            .map(p => ({ name: p.name }));
          if (!inVoice) renderVoiceUsers();
        })
        .subscribe(async status => {
          if (status === 'SUBSCRIBED') {
            await _presenceChannel.track({ name: username, inVoice: false });
          }
        });
    }

    async function setPresenceVoice(active) {
      if (!_presenceChannel) return;
      await _presenceChannel.track({ name: username, inVoice: active });
    }

    function shouldAutoRejoinVoice() {
      return localStorage.getItem(VOICE_REJOIN_STORAGE_KEY) === '1';
    }

    function setAutoRejoinVoice(active) {
      if (active) localStorage.setItem(VOICE_REJOIN_STORAGE_KEY, '1');
      else localStorage.removeItem(VOICE_REJOIN_STORAGE_KEY);
    }

    // ═══════════════════════════════════════════════════════════════
    // VOICE USERS UI — LiveKit cuando conectado, Presence cuando no
    // ═══════════════════════════════════════════════════════════════
    function renderVoiceUsers() {
      voiceUsersList.innerHTML = '';
      const connected = inVoice && room;

      voiceDot.classList.toggle('disconnected', !connected);
      voiceStatusEl.classList.toggle('disconnected', !connected);
      chanVoice.classList.toggle('active', connected);

      if (connected) {
        // Dentro del canal: datos en tiempo real de LiveKit (speaking, mute)
        const participants = [room.localParticipant, ...room.remoteParticipants.values()];
        participants.forEach(participant => {
          const name     = participant.name || participant.identity || 'Invitado';
          const speaking = participant.isSpeaking;
          const isLocal  = participant === room.localParticipant;

          const row = document.createElement('div');
          row.className = 'voice-user';

          const avatar = document.createElement('div');
          avatar.className = 'voice-avatar' + (speaking ? ' speaking' : '');
          avatar.textContent = name.charAt(0).toUpperCase();

          const nameSpan = document.createElement('span');
          nameSpan.className = 'voice-user-name' + (speaking ? ' speaking' : '');
          nameSpan.textContent = name + (isLocal ? ' (tú)' : '');

          const mic = document.createElement('span');
          mic.className = 'voice-mic-icon';
          const isMuted = !participant.isMicrophoneEnabled;
          mic.textContent = speaking ? '🎙️' : (isMuted ? '🔇' : '🎤');

          row.appendChild(avatar);
          row.appendChild(nameSpan);
          row.appendChild(mic);
          voiceUsersList.appendChild(row);
        });
      } else {
        // Fuera del canal: lista de quiénes están conectados vía Supabase Presence
        if (presenceVoiceUsers.length === 0) return;
        presenceVoiceUsers.forEach(({ name }) => {
          const row = document.createElement('div');
          row.className = 'voice-user';

          const avatar = document.createElement('div');
          avatar.className = 'voice-avatar';
          avatar.textContent = name.charAt(0).toUpperCase();

          const nameSpan = document.createElement('span');
          nameSpan.className = 'voice-user-name';
          nameSpan.textContent = name;

          row.appendChild(avatar);
          row.appendChild(nameSpan);
          voiceUsersList.appendChild(row);
        });
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // LIVEKIT — SALA DE VOZ Y PANTALLA
    // ═══════════════════════════════════════════════════════════════
    async function fetchLiveKitToken(userName, roomName) {
      const url = `${TOKEN_URL}?username=${encodeURIComponent(userName)}&room=${encodeURIComponent(roomName)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
      return res.json(); // { token, url }
    }

    const remoteStreams = {}; // participantSid -> { card, statsInterval }

    async function joinVoice() {
      const { Room, RoomEvent, Track } = LivekitClient;
      showToast('Conectando al canal de voz...');

      const { token, url: wsUrl } = await fetchLiveKitToken(username, ROOM_NAME);

      room = new Room({
        adaptiveStream: false,   // no reducir calidad según el tamaño del player
        dynacast:       false,   // no reducir calidad según número de suscriptores
        audioCaptureDefaults: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
        },
        publishDefaults: {
          stopMicTrackOnMute: false,
        },
      });

      room
        .on(RoomEvent.ParticipantConnected, participant => {
          renderVoiceUsers();
          addMessage(`→ ${participant.name || participant.identity} se unió al canal de voz`);
        })
        .on(RoomEvent.ParticipantDisconnected, participant => {
          removeStreamCard(participant.sid);
          renderVoiceUsers();
          addMessage(`← ${participant.name || participant.identity} salió del canal de voz`);
        })
        .on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
          if (track.kind === Track.Kind.Audio) {
            // Micrófono o audio del sistema (screen share audio)
            const el = track.attach();
            el.dataset.participantSid = participant.sid;
            el.dataset.trackSource   = track.source;
            el.style.display = 'none';
            document.body.appendChild(el);
          } else if (track.kind === Track.Kind.Video) {
            upsertStreamCard(participant.sid, false, track, participant);
          }
        })
        .on(RoomEvent.TrackUnsubscribed, (track, publication, participant) => {
          track.detach();
          if (track.kind === Track.Kind.Video) {
            removeStreamCard(participant.sid);
          } else {
            document.querySelectorAll(`[data-participant-sid="${participant.sid}"][data-track-source="${track.source}"]`)
              .forEach(el => el.remove());
          }
        })
        .on(RoomEvent.LocalTrackPublished, publication => {
          if (publication.track?.kind === Track.Kind.Video) {
            upsertStreamCard('local', true, publication.track, null);
            screenToggle.textContent = '🖥 Detener';
          }
        })
        .on(RoomEvent.LocalTrackUnpublished, publication => {
          if (publication.track?.kind === Track.Kind.Video) {
            removeStreamCard('local');
            screenToggle.textContent = '🖥 Pantalla';
          }
        })
        .on(RoomEvent.ActiveSpeakersChanged, () => renderVoiceUsers())
        .on(RoomEvent.TrackMuted,   () => renderVoiceUsers())
        .on(RoomEvent.TrackUnmuted, () => renderVoiceUsers())
        .on(RoomEvent.Disconnected, () => {
          inVoice = false; room = null;
          setPresenceVoice(false);
          voiceToggle.disabled = false;
          voiceToggle.textContent = 'Conectar';
          voiceToggle.className = 'action-btn primary';
          voiceStatusEl.textContent = 'Desconectado';
          micToggle.disabled = true;
          micToggle.textContent = '🎤';
          micToggle.className = 'action-btn secondary icon-btn';
          screenToggle.disabled = true;
          renderVoiceUsers();
        });

      await room.connect(wsUrl, token);
      await room.localParticipant.setMicrophoneEnabled(true);

      inVoice = true;
      setPresenceVoice(true);
      setAutoRejoinVoice(true);
      voiceToggle.disabled = false;
      voiceToggle.textContent = 'Salir de voz';
      voiceToggle.className = 'action-btn danger';
      voiceStatusEl.textContent = 'Conectado · voz general';
      micToggle.disabled = false;
      screenToggle.disabled = false;

      const alreadyIn = [...room.remoteParticipants.values()];
      if (alreadyIn.length) alreadyIn.forEach(p => addMessage(`→ ${p.name || p.identity} ya está en el canal`));

      renderVoiceUsers();
      showToast('Conectado al canal de voz', true);
    }

    async function leaveVoice() {
      await stopScreenShare();
      if (room) await room.disconnect();
      room = null; inVoice = false;
      setPresenceVoice(false);
      setAutoRejoinVoice(false);
      voiceToggle.textContent = 'Conectar';
      voiceToggle.className = 'action-btn primary';
      voiceStatusEl.textContent = 'Desconectado';
      micToggle.disabled = true;
      micToggle.textContent = '🎤';
      micToggle.className = 'action-btn secondary icon-btn';
      screenToggle.disabled = true;
      renderVoiceUsers();
      addMessage('← Saliste del canal de voz');
    }

    // ── Mute / Unmute micrófono ──
    micToggle.addEventListener('click', async () => {
      if (!room || !inVoice) return;
      const enabled = room.localParticipant.isMicrophoneEnabled;
      await room.localParticipant.setMicrophoneEnabled(!enabled);
      if (enabled) {
        micToggle.textContent = '🔇';
        micToggle.className = 'action-btn muted icon-btn';
        micToggle.title = 'Activar micrófono';
      } else {
        micToggle.textContent = '🎤';
        micToggle.className = 'action-btn secondary icon-btn';
        micToggle.title = 'Silenciar micrófono';
      }
      renderVoiceUsers();
    });

    voiceToggle.addEventListener('click', async () => {
      if (inVoice) {
        await leaveVoice();
      } else {
        if (!username) { alert('Pon un nombre de usuario primero.'); return; }
        try { await joinVoice(); }
        catch (err) {
          console.error(err);
          showToast('Error al conectar: ' + err.message);
          room = null; inVoice = false;
        }
      }
    });

    async function restoreVoiceOnReload() {
      if (!username || inVoice || !shouldAutoRejoinVoice()) return;
      voiceToggle.disabled = true;
      voiceToggle.textContent = 'Reconectando...';
      voiceStatusEl.textContent = 'Reconectando...';
      showToast('Reconectando al canal de voz...');
      try {
        await joinVoice();
      } catch (err) {
        console.error('No se pudo restaurar voz al recargar:', err);
        setAutoRejoinVoice(false);
        showToast('No se pudo restaurar la conexión de voz');
      } finally {
        voiceToggle.disabled = false;
      }
    }

    // ── Stream cards ──
    function upsertStreamCard(id, isLocal, videoTrack, participant) {
      const authorName = isLocal
        ? username
        : (participant?.name || participant?.identity || 'Alguien');

      if (remoteStreams[id]?.card) {
        const video = remoteStreams[id].card.querySelector('.stream-video');
        if (video) { videoTrack.detach(video); videoTrack.attach(video); }
        return;
      }

      const card = document.createElement('div');
      card.className = 'stream-card';
      card.id = `stream-${id}`;
      card.innerHTML = `
        <div class="stream-card-header">
          <span class="screen-live-badge"><span class="screen-live-dot"></span>EN VIVO</span>
          <span class="stream-author">${authorName.replace(/</g,'&lt;')}</span>
          <span class="stream-stats"></span>
        </div>
        <video class="stream-video" autoplay playsinline ${isLocal ? 'muted' : ''}></video>
        <div class="stream-card-footer">
          <button class="stream-ctrl-btn" data-fs>⤢ Pantalla completa</button>
          ${isLocal
            ? `<button class="stream-ctrl-btn danger" data-stop>✕ Dejar de transmitir</button>`
            : `<button class="stream-ctrl-btn danger" data-leave>↩ Cerrar vista</button>`}
        </div>
      `;

      const video = card.querySelector('.stream-video');
      videoTrack.attach(video);

      card.querySelector('[data-fs]').addEventListener('click', async () => {
        if (document.fullscreenElement) await document.exitFullscreen().catch(() => {});
        else await video.requestFullscreen().catch(() => {});
      });
      video.addEventListener('dblclick', async () => {
        if (document.fullscreenElement) await document.exitFullscreen().catch(() => {});
        else await video.requestFullscreen().catch(() => {});
      });

      card.querySelector('[data-stop]')?.addEventListener('click', stopScreenShare);
      card.querySelector('[data-leave]')?.addEventListener('click', () => removeStreamCard(id));

      remoteStreams[id] = { card, statsInterval: null, videoTrack };
      streamsContainer.appendChild(card);
      startStatsMonitor(id, videoTrack);
    }

    function removeStreamCard(id) {
      const entry = remoteStreams[id];
      if (!entry) return;
      if (entry.statsInterval) clearInterval(entry.statsInterval);
      entry.card?.remove();
      delete remoteStreams[id];
    }

    function startStatsMonitor(id, videoTrack) {
      const entry = remoteStreams[id];
      if (!entry || entry.statsInterval) return;

      let prevBytes = 0, prevTs = 0;

      entry.statsInterval = setInterval(async () => {
        const statsEl = entry.card?.querySelector('.stream-stats');
        if (!statsEl || !videoTrack?.mediaStreamTrack) return;

        // Resolución y FPS del track nativo
        const s   = videoTrack.mediaStreamTrack.getSettings();
        const w   = s.width   || '?';
        const h   = s.height  || '?';
        const fps = s.frameRate ? Math.round(s.frameRate) : '?';

        // Bitrate real desde WebRTC stats (funciona en local y remoto)
        let kbpsStr = '';
        try {
          const pc = videoTrack.sender?.pc || videoTrack.receiver?.pc
            || room?.engine?.pcManager?.publisher?.pc
            || room?.engine?.subscriber?.pc;
          if (pc) {
            const stats = await pc.getStats();
            stats.forEach(r => {
              const isOutbound = r.type === 'outbound-rtp'  && r.kind === 'video' && r.bytesSent    != null;
              const isInbound  = r.type === 'inbound-rtp'   && r.kind === 'video' && r.bytesReceived != null;
              if (isOutbound || isInbound) {
                const bytes = isOutbound ? r.bytesSent : r.bytesReceived;
                const now   = r.timestamp;
                if (prevTs && prevBytes) {
                  const kbps = Math.round(((bytes - prevBytes) * 8) / (now - prevTs));
                  if (kbps > 0) kbpsStr = ` · ${kbps >= 1000 ? (kbps/1000).toFixed(1)+'Mbps' : kbps+'kbps'}`;
                }
                prevBytes = bytes; prevTs = now;
              }
            });
          }
        } catch (_) {}

        // Convertir kbpsStr ("2.2Mbps" o "800kbps") a número kbps para comparar
        let actualKbps = 0;
        if (kbpsStr) {
          const mbpsMatch = kbpsStr.match(/([\d.]+)\s*Mbps/i);
          const kbpsMatch = kbpsStr.match(/([\d.]+)\s*kbps/i);
          if (mbpsMatch)      actualKbps = parseFloat(mbpsMatch[1]) * 1000;
          else if (kbpsMatch) actualKbps = parseFloat(kbpsMatch[1]);
        }
        const configured = screenBitrateKbps || 8000;
        const limited    = actualKbps > 0 && actualKbps < configured * 0.5 ? ' ⚠ red limitando' : '';
        statsEl.textContent = `${w}×${h} ${fps}fps${kbpsStr}${limited}`;
      }, 1500);
    }

    function roomIsConnected() {
      return room && room.state === 'connected';
    }

    function getBestScreenCodec() {
      try {
        const codecs = RTCRtpSender.getCapabilities('video')?.codecs || [];
        const mimes = codecs.map(c => (c.mimeType || '').toLowerCase());
        if (mimes.includes('video/av1')) return 'av1';
        if (mimes.includes('video/vp9')) return 'vp9';
      } catch (_) {}
      return 'vp8';
    }

    function getEffectiveScreenProfile(width, height, requestedFps, requestedKbps) {
      let fps = Math.max(10, Math.min(requestedFps || 30, 60));
      let kbps = Math.max(1200, Math.min(requestedKbps || 8000, 150000));

      const pixels = width * height;
      if (pixels >= 3840 * 2160) fps = Math.min(fps, 30);
      else if (pixels >= 2560 * 1440) fps = Math.min(fps, 45);

      const recommendedMin = Math.ceil((pixels / (1280 * 720)) * (fps / 30) * 4500);
      kbps = Math.max(kbps, Math.min(recommendedMin, 80000));

      return { fps, kbps };
    }

    async function applySenderEncoding(lkTrack, kbps, fps) {
      if (!lkTrack?.sender) return;
      const params = lkTrack.sender.getParameters();
      if (!params.encodings?.length) return;

      if (params.encodings.length > 1) {
        const scales = [0.2, 0.45, 1];
        params.encodings.forEach((enc, i) => {
          const scale = scales[Math.min(i, scales.length - 1)];
          enc.maxBitrate = Math.max(300_000, Math.round(kbps * 1000 * scale));
          enc.maxFramerate = i < params.encodings.length - 1 ? Math.max(10, Math.round(fps * 0.5)) : fps;
          enc.priority = 'high';
          enc.networkPriority = 'high';
          enc.scalabilityMode = fps >= 30 ? 'L1T3' : 'L1T2';
        });
      } else {
        const enc = params.encodings[0];
        enc.maxBitrate = kbps * 1000;
        enc.maxFramerate = fps;
        enc.priority = 'high';
        enc.networkPriority = 'high';
        enc.scalabilityMode = fps >= 30 ? 'L1T3' : 'L1T2';
      }

      await lkTrack.sender.setParameters(params);
    }

    function startScreenBitrateAdaptation(lkTrack, baseKbps, fps) {
      if (_screenAdaptInterval) clearInterval(_screenAdaptInterval);
      let targetKbps = Math.round(baseKbps * 0.8);
      let stableCycles = 0;
      screenBitrateKbps = targetKbps;

      _screenAdaptInterval = setInterval(async () => {
        if (lkTrack !== _screenVideoTrack || !roomIsConnected()) {
          clearInterval(_screenAdaptInterval);
          _screenAdaptInterval = null;
          return;
        }
        if (!lkTrack?.sender) return;

        try {
          const stats = await lkTrack.sender.getStats();
          let reason = '';
          let fpsSent = fps;
          stats.forEach(report => {
            if (report.type === 'outbound-rtp' && report.kind === 'video') {
              if (report.qualityLimitationReason) reason = report.qualityLimitationReason;
              if (typeof report.framesPerSecond === 'number') fpsSent = report.framesPerSecond;
            }
          });

          if (reason === 'bandwidth' || fpsSent < fps * 0.65) {
            targetKbps = Math.max(1200, Math.round(targetKbps * 0.85));
            stableCycles = 0;
          } else {
            stableCycles += 1;
            if (stableCycles >= 2 && targetKbps < baseKbps) {
              targetKbps = Math.min(baseKbps, Math.round(targetKbps * 1.08));
            }
          }

          screenBitrateKbps = targetKbps;
          await applySenderEncoding(lkTrack, targetKbps, fps);
        } catch (_) {}
      }, 2500);
    }

    // ── Compartir pantalla ──
    async function startScreenShare() {
      if (!roomIsConnected() || _screenVideoTrack) return;

      const displayW = Math.round((window.screen?.width || 1920) * (window.devicePixelRatio || 1));
      const displayH = Math.round((window.screen?.height || 1080) * (window.devicePixelRatio || 1));
      const w = Math.max(1280, Math.min(displayW, 2560));
      const h = Math.max(720, Math.min(displayH, 1440));
      const requestedFps = 60;
      const requestedKbps = 20000;
      const profile = getEffectiveScreenProfile(w, h, requestedFps, requestedKbps);
      const fps = profile.fps;
      const kbps = profile.kbps;
      screenBitrateKbps = kbps;

      // Capturar con frameRate en la propia llamada Y aplicarlo después como respaldo
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: {
          width:     { ideal: w },
          height:    { ideal: h },
          frameRate: { ideal: fps, max: fps },
        },
        audio: {
          echoCancellation: false, noiseSuppression: false,
          autoGainControl: false,  sampleRate: 48000, channelCount: 2,
        },
      });

      const nativeVideo = stream.getVideoTracks()[0];
      const nativeAudio = stream.getAudioTracks()[0] || null;
      if (!nativeVideo) return;

      // Reforzar con applyConstraints por si el navegador ignoró el valor inicial
      try {
        await nativeVideo.applyConstraints({
          width: { ideal: w },
          height: { ideal: h },
          frameRate: { ideal: fps, max: fps },
        });
      } catch (_) {}
      try { nativeVideo.contentHint = 'detail'; } catch (_) {}

      const { LocalVideoTrack, LocalAudioTrack, Track } = LivekitClient;
      _screenVideoTrack = new LocalVideoTrack(nativeVideo, undefined, false);

      // 3. Publicar con codec eficiente y encoding de alta calidad
      if (!roomIsConnected()) {
        nativeVideo.stop();
        _screenVideoTrack = null;
        return;
      }
      try {
        await room.localParticipant.publishTrack(_screenVideoTrack, {
          source: Track.Source.ScreenShare,
          videoEncoding: {
            maxBitrate: kbps * 1000, maxFramerate: fps, priority: 'high',
          },
          degradationPreference: 'balanced',
          videoCodec: getBestScreenCodec(),
          backupCodec: true,
        });
      } catch (err) {
        // Si falla la publicación, limpiar el track para que el usuario pueda reintentar
        nativeVideo.stop();
        _screenVideoTrack = null;
        throw err;
      }

      // 4. Forzar parámetros directamente en RTCRtpSender en múltiples momentos
      //    (LiveKit puede sobrescribirlos, por eso reintentamos)
      forceEncoderSettings(_screenVideoTrack, kbps, fps);
      startScreenBitrateAdaptation(_screenVideoTrack, kbps, fps);

      if (nativeAudio) {
        _screenAudioTrack = new LocalAudioTrack(nativeAudio, undefined, false);
        await room.localParticipant.publishTrack(_screenAudioTrack, {
          source: Track.Source.ScreenShareAudio,
          audioPreset: { maxBitrate: 320_000 },
        });
      }
      nativeVideo.addEventListener('ended', () => stopScreenShare(true));
    }

    // Fuerza maxBitrate/maxFramerate directamente en el RTCRtpSender.
    // Se aplica varias veces porque LiveKit puede renegociar y sobrescribir.
    async function forceEncoderSettings(lkTrack, kbps, fps) {
      for (const delay of [100, 600, 1500, 3000, 6000]) {
        await new Promise(r => setTimeout(r, delay));
        // Parar si el track ya no es el activo o la sala se desconectó
        if (lkTrack !== _screenVideoTrack || !roomIsConnected()) break;
        try {
          await applySenderEncoding(lkTrack, kbps, fps);
        } catch (_) {}
      }
    }

    async function stopScreenShare(showEnded = false) {
      if (_screenAdaptInterval) {
        clearInterval(_screenAdaptInterval);
        _screenAdaptInterval = null;
      }
      if (_screenVideoTrack) {
        const trackToStop = _screenVideoTrack;
        _screenVideoTrack = null; // limpiar primero para cortar forceEncoderSettings
        try { trackToStop.mediaStreamTrack?.stop(); } catch (_) {}
        if (roomIsConnected()) {
          try { await room.localParticipant.unpublishTrack(trackToStop); } catch (_) {}
        }
      }
      if (_screenAudioTrack) {
        const trackToStop = _screenAudioTrack;
        _screenAudioTrack = null;
        try { trackToStop.mediaStreamTrack?.stop(); } catch (_) {}
        if (roomIsConnected()) {
          try { await room.localParticipant.unpublishTrack(trackToStop); } catch (_) {}
        }
      }
      // Reset del botón (por si el evento LocalTrackUnpublished no llega a tiempo)
      screenToggle.textContent = '🖥 Pantalla';
      screenToggle.className   = 'action-btn secondary icon-btn';

      // Si la transmisión se cortó inesperadamente, mostrar overlay con botón de reinicio
      if (showEnded && inVoice) {
        const card = document.getElementById('stream-local');
        if (card && !card.querySelector('.stream-ended-overlay')) {
          const overlay = document.createElement('div');
          overlay.className = 'stream-ended-overlay';
          overlay.innerHTML = `
            <span>📴 Transmisión interrumpida</span>
            <button id="btn-restream">▶ Volver a transmitir</button>
          `;
          card.appendChild(overlay);
          overlay.querySelector('#btn-restream').addEventListener('click', async () => {
            overlay.remove();
            try { await startScreenShare(); }
            catch (err) { if (err.name !== 'NotAllowedError') console.error(err); }
          });
          addMessage('📴 Tu transmisión se interrumpió. Haz clic en "Volver a transmitir" para continuar.');
        }
      }
    }

    screenToggle.addEventListener('click', async () => {
      if (!inVoice) { alert('Primero conéctate al canal de voz.'); return; }
      try {
        if (_screenVideoTrack) await stopScreenShare();
        else await startScreenShare();
      } catch (err) {
        if (err.name !== 'NotAllowedError') console.error(err);
      }
    });

    // ═══════════════════════════════════════════════════════════════
    // MENÚ RESPONSIVO — sidebars en móvil / tablet
    // ═══════════════════════════════════════════════════════════════
    const sidebarEl        = document.querySelector('.channels-sidebar');
    const overlayEl        = document.getElementById('sidebar-overlay');
    const btnSidebarToggle = document.getElementById('btn-sidebar-toggle');

    function closeAllDrawers() {
      sidebarEl.classList.remove('open');
      overlayEl.classList.remove('show');
    }
    btnSidebarToggle?.addEventListener('click', () => {
      const opening = !sidebarEl.classList.contains('open');
      closeAllDrawers();
      if (opening) { sidebarEl.classList.add('open'); overlayEl.classList.add('show'); }
    });
    overlayEl?.addEventListener('click', closeAllDrawers);
    document.querySelectorAll('.channel-item').forEach(el => {
      el.addEventListener('click', () => { if (window.innerWidth <= 720) closeAllDrawers(); });
    });

    // ═══════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════
    if (username) {
      initChat();
      initPresence();
      restoreVoiceOnReload();
    }
  </script>
</body>
</html>
